openapi: 3.0.0
info:
  title: Blogs API Documentation
  version: 1.0.0

security:
  - BasicAuth: []

tags:
  - name: Blogs
    description: API for managing blogs

paths:
  /api/blogs:
    get:
      summary: Returns all blogs
      tags: [Blogs]
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogViewDto'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogViewDto'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogViewDto'
    post:
      summary: Create new blog
      tags: [Blogs]
      requestBody:
        required: true
        description: Data for constructing new Blog entity
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogInputDto'
      responses:
        '201':
          description: The blog was successfully created
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BlogViewDto'
            application/json:
              schema:
                $ref: '#/components/schemas/BlogViewDto'
            text/json:
              schema:
                $ref: '#/components/schemas/BlogViewDto'
        '400':
          description: If the inputModel has incorrect values
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
            text/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '401':
          description: Unauthorized

  /api/blogs/{id}:
    get:
      summary: Get a blog by ID
      tags: [Blogs]
      parameters:
        - in: path
          name: id
          required: true
          description: Existing blog id
          schema:
            type: string
            example: id
      responses:
        '200':
          description: Success
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BlogViewDto'
            application/json:
              schema:
                $ref: '#/components/schemas/BlogViewDto'
            text/json:
              schema:
                $ref: '#/components/schemas/BlogViewDto'
        '404':
          description: Not found
    put:
      summary: Update a blog by ID
      tags: [Blogs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogInputDto'
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: id
      responses:
        '204':
          description: No Content
        '400':
          description: If the inputModel has incorrect values
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
            text/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    delete:
      summary: Delete a blog by ID
      tags: [Blogs]
      parameters:
        - in: path
          name: id
          required: true
          description: Blog id
          schema:
            type: string
            example: id
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '404':
          description: Not found

components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
  schemas:
    BlogViewDto:
      type: object
      required:
        - id
        - name
        - description
        - websiteUrl
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        websiteUrl:
          type: string
    BlogInputDto:
      type: object
      required:
        - name
        - description
        - websiteUrl
      properties:
        name:
          type: string
          maxLength: 15
        description:
          type: string
          maxLength: 500
        websiteUrl:
          type: string
          maxLength: 100
          pattern: ^https://([a-zA-Z0-9_-]+\.)+[a-zA-Z0-9_-]+(\/[a-zA-Z0-9_-]+)*\/?$
    FieldError:
      type: object
      properties:
        field:
          type: string
          nullable: true
          description: What field/property of input model has error
        message:
          type: string
          nullable: true
          description: Message with error explanation for certain field
    APIErrorResult:
      type: object
      properties:
        errorsMessages:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/FieldError'
